name: Build Genesis OpenMM conda package

# Builds a linux-64 / CUDA 13 / Python 3.12 conda package of this fork using the
# conda-forge/openmm-feedstock recipe, with the source swapped to point at this
# checkout and a `_genesis_<shortsha>` suffix appended to the build string so the
# Genesis build sorts above the conda-forge build of the same version.
#
# Triggers:
#   - push to master                  → build, upload as workflow artifact
#   - push of tag matching `genesis-v*` → build, upload artifact, attach to GitHub Release
#   - workflow_dispatch (with optional release_tag input)

on:
  push:
    branches: [master]
    tags: ['genesis-v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: "If set, attach the built .conda to this GitHub Release tag (creates the release if missing)."
        type: string
        required: false

permissions:
  contents: write  # needed for `gh release create` on tag pushes

env:
  # Pin the conda-forge openmm-feedstock to the "Build 8.5.1" commit so the matrix
  # files and recipe template are reproducible. Bump explicitly when conda-forge
  # publishes a new openmm version.
  FEEDSTOCK_REF: c748fc67e97f7e6c64cc56942002adf3f2bd9cb9
  # Matches the openmm version in CMakeLists.txt on this fork. The feedstock at
  # FEEDSTOCK_REF templates 8.5.1, so we override it back to 8.5.0 to keep the
  # package version aligned with the source.
  GENESIS_OPENMM_VERSION: "8.5.0"
  MATRIX_FILE: linux_64_c_stdlib_version2.28cuda_compiler_version13.0python3.12.____cpython.yaml

jobs:
  build:
    name: linux-64 / CUDA 13 / py3.12
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space on runner
        # conda-build + CUDA 13 SDK is tight on the stock GHA runner (~14 GB free).
        # Drop the largest pre-installed toolchains we don't need.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Checkout openmm fork
        uses: actions/checkout@v4
        with:
          path: openmm
          fetch-depth: 0

      - name: Checkout conda-forge/openmm-feedstock (pinned)
        uses: actions/checkout@v4
        with:
          repository: conda-forge/openmm-feedstock
          ref: ${{ env.FEEDSTOCK_REF }}
          path: feedstock

      - name: Set up micromamba with conda-build
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build-env
          create-args: >-
            python=3.12
            conda-build
            boa
            git
            jq
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict

      - name: Patch feedstock recipe to use this fork
        shell: bash -el {0}
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd feedstock/recipe
          # SHORT_SHA exported from `github.sha` (full 40-char SHA); trim to 8 chars.
          SHORT_SHA="${SHORT_SHA:0:8}"
          export SHORT_SHA GENESIS_OPENMM_VERSION

          python - <<'PY'
          import os, re, pathlib

          p = pathlib.Path("meta.yaml")
          text = p.read_text()

          # 1. Pin the templated version to the fork's CMakeLists.txt version.
          text = re.sub(
              r'\{%\s*set\s+version\s*=\s*"[^"]+"\s*%\}',
              '{%% set version = "%s" %%}' % os.environ["GENESIS_OPENMM_VERSION"],
              text, count=1,
          )

          # 2. Replace the `source:` block (next top-level YAML key terminates it)
          #    with a `path:` pointing at the sibling openmm checkout.
          text = re.sub(
              r'(?ms)^source:\n(?:[ \t]+.*\n)+',
              "source:\n  path: ../../openmm\n",
              text, count=1,
          )

          # 3. Mark the build with `_genesis_<shortsha>` so the binary sorts above
          #    conda-forge's build of the same version (channel priority still
          #    decides selection, but this keeps reproducibility clear).
          #    The recipe templates string: only on osx; on linux conda-build
          #    generates the default. Inject a linux-only string override.
          short = os.environ["SHORT_SHA"]
          linux_string = (
              '  string: "py{{ PY_VER.replace(\'.\', \'\') }}h'
              '{{ PKG_HASH }}_{{ build }}_genesis_' + short + '"  # [linux]\n'
          )
          if "_genesis_" not in text:
              text = re.sub(
                  r'^(build:\n)',
                  r'\1' + linux_string,
                  text, count=1, flags=re.MULTILINE,
              )

          p.write_text(text)
          PY

          echo "--- patched meta.yaml (head) ---"
          head -50 meta.yaml

      - name: Build conda package
        shell: bash -el {0}
        env:
          # Reduce conda-build chatter and keep the work tree on the runner's
          # large `/mnt` partition so we don't exhaust /home.
          CONDA_BLD_PATH: /mnt/conda-bld
        run: |
          set -euo pipefail
          sudo mkdir -p "$CONDA_BLD_PATH" && sudo chown "$USER:" "$CONDA_BLD_PATH"
          conda-build feedstock/recipe \
            -m "feedstock/.ci_support/${MATRIX_FILE}" \
            --output-folder ./conda-bld \
            --no-anaconda-upload \
            --no-test
          echo "Built artifacts:"
          ls -lh ./conda-bld/linux-64/

      - name: Identify .conda artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          PKG=$(ls ./conda-bld/linux-64/openmm-*.conda | head -1)
          if [ -z "$PKG" ]; then
            echo "::error::no openmm .conda produced"
            exit 1
          fi
          BASENAME=$(basename "$PKG")
          # Stable filename for the Release asset so the install script can hardcode it.
          STABLE=./conda-bld/linux-64/openmm-linux-64-cuda13-py312.conda
          cp "$PKG" "$STABLE"
          echo "package_path=$PKG" >> "$GITHUB_OUTPUT"
          echo "stable_path=$STABLE" >> "$GITHUB_OUTPUT"
          echo "basename=$BASENAME" >> "$GITHUB_OUTPUT"

      - name: Upload .conda as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmm-linux-64-cuda13-py312-${{ github.sha }}
          path: ./conda-bld/linux-64/openmm-*.conda
          retention-days: 90
          if-no-files-found: error

      - name: Attach to GitHub Release (tag push)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES="Genesis OpenMM build of commit ${GITHUB_SHA}. Built via .github/workflows/build-conda.yml against conda-forge/openmm-feedstock@${FEEDSTOCK_REF::8}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.artifact.outputs.package_path }}" \
              "${{ steps.artifact.outputs.stable_path }}" \
              --clobber
          else
            gh release create "$TAG" \
              "${{ steps.artifact.outputs.package_path }}" \
              "${{ steps.artifact.outputs.stable_path }}" \
              --title "$TAG" --notes "$NOTES"
          fi

      - name: Attach to GitHub Release (manual dispatch with release_tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          NOTES="Genesis OpenMM build of commit ${GITHUB_SHA} (manual dispatch). Built against conda-forge/openmm-feedstock@${FEEDSTOCK_REF::8}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.artifact.outputs.package_path }}" \
              "${{ steps.artifact.outputs.stable_path }}" \
              --clobber
          else
            gh release create "$TAG" \
              "${{ steps.artifact.outputs.package_path }}" \
              "${{ steps.artifact.outputs.stable_path }}" \
              --title "$TAG" --notes "$NOTES"
          fi
